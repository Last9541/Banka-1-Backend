services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: banka1-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-banka1}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-banka1}
      POSTGRES_DB: ${DB_NAME:-banka1}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-banka1}"]
      interval: 10s
      timeout: 5s
      retries: 5


