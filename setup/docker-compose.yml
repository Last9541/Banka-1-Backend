services:
  postgres:
    image: postgres:16
    container_name: banka_postgres_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banka_db}
      POSTGRES_USER: ${POSTGRES_USER:-banka_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banka_pass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - banka-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banka_user} -d ${POSTGRES_DB:-banka_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banka_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbit}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    networks:
      - banka-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-service:
    build:
      context: ..
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NOTIFICATION_SERVICE_HOST: 0.0.0.0
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8080}:${NOTIFICATION_SERVICE_PORT:-8080}"
    networks:
      - banka-network

  user-service:
    build:
      context: ..
      dockerfile: user-service/Dockerfile
    container_name: banka_user_service
    restart: on-failure
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      RABBIT_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${DOCKER_PORT:-8082}:${SERVER_PORT:-8081}"
    networks:
      - banka-network

networks:
  banka-network:
    driver: bridge

volumes:
  postgres-data: